use_host_computer_server: true
os_type: macos
api_port: 8000
display: "1280x720"
timeout: 180
telemetry_enabled: false
screenshot_delay: 0.5

# Physical pixel dimensions of the display.
# The macOS server captures screenshots at native Retina resolution (ImageGrab.grab())
# and clicks via Quartz CGEventPost — both work in physical pixel space.
# Run: python3 -c "from PIL import ImageGrab; img=ImageGrab.grab(); print(img.width, img.height)"
# to confirm the actual capture size.
screen_width: 3024
screen_height: 1964

# Chat window scroll settings (step 5: read messages)
# scroll_chat_window_clicks_per_pass: wheel notches per scroll iteration
# scroll_max_chat_window_passes: hard cap on iterations before giving up
scroll_chat_window_clicks_per_pass: 20
scroll_max_chat_window_passes: 8

# Chat list panel scroll settings (left sidebar pagination)
# scroll_chat_list_clicks_per_scroll: wheel notches to advance one full viewport
scroll_chat_list_clicks_per_scroll: 15
