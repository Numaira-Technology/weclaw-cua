use_host_computer_server: true
os_type: windows
api_port: 8000
display: "1280x720"
timeout: 180
telemetry_enabled: false
screenshot_delay: 0.5

# Screen and UI element positions for 2560x1440 display
screen_width: 2560
screen_height: 1440

# WeChat UI fixed button positions (SCREEN COORDINATES - absolute pixels)
# These are used directly for clicking, no conversion needed
wechat_three_dots_x: 2525
wechat_three_dots_y: 48
wechat_minus_button_x: 2525
wechat_minus_button_y: 200
wechat_delete_button_x: 1345
wechat_delete_button_y: 920

# Human-like mouse movement settings
human_mouse:
  enabled: true
  speed_factor: 0.8 # Lower = faster movement (0.5-2.0 recommended)
  curve_variance: 0.3 # How much the path curves (0.1-0.5)
  zigzag_enabled: false # Enable subtle zigzag patterns
  base_delay_ms: 5.0 # Base delay between movement steps in milliseconds

# Chat window scroll settings (step 5: read messages)
# scroll_chat_window_clicks_per_pass: scroll notches per iteration (increase for faster scrolling)
# scroll_max_chat_window_passes: hard cap on iterations before giving up
scroll_chat_window_clicks_per_pass: 5
scroll_max_chat_window_passes: 4

# Chat list panel scroll settings (left sidebar pagination)
# scroll_chat_list_clicks_per_scroll: wheel notches to advance one full viewport (~21 threads)
scroll_chat_list_clicks_per_scroll: 15
