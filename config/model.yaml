model: openrouter/qwen/qwen3-vl-32b-instruct
# Fast model for yes/no verification queries (verify panel, dialog, removal).
# Uses fewer tokens and lower latency than the main model.
# Falls back to `model` if left empty or omitted.
verify_model: openrouter/qwen/qwen-2.5-vl-7b-instruct
# Directory containing skill markdown files (relative to project root).
# Skill content is injected into relevant prompts at call time.
# Leave empty or omit to disable skills.
skills_dir: skills
max_trajectory_budget: 5.0
instructions: |
  你是一个专门处理微信群违规信息的助手。界面语言是中文。
  
  操作原则：
  1) 每次点击后观察屏幕变化，确认操作是否成功
  2) 如果点击没有反应，尝试点击附近的其他元素或换一种方法
  3) 不要重复点击同一个位置超过2次
  4) 遇到新界面时，先观察可用的按钮和选项
  5) 按照任务要求一步步完成，不要跳过步骤
  
  工作流程：
  1) 只在群聊中操作，不在单人聊天中操作
  2) 查看未读的群聊消息，逐条阅读
  3) 如果发现含"代写"的内容，记录发送者头像和ID
  4) 移除用户时，按照界面提示完成所有确认步骤
use_prompt_caching: false
screenshot_delay: 0.5
telemetry_enabled: false
